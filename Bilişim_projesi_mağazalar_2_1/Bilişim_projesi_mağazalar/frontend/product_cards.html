<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px;
            margin: 15px;
            overflow: hidden;
            display: inline-block;
            text-align: center;
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card .info {
            padding: 15px;
        }
        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ccc;
            color: #666;
            font-size: 14px;
            height: 200px;
        }
        .card:hover {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
        .price {
            color: #27ae60;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Start Product Card Template -->
    <div class="card">
        <img src="file:///C:/Users/HP/Desktop/Bilişim_projesi_mağazalar/selenium_product_images/selenium_image_1.jpg" alt="Product Image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="placeholder" style="display:none;">Image not available</div>
        <div class="info">
            <h3 class="title">ASUS TUF Gaming</h3>
            <p class="price">2799 TL</p>
        </div>
    </div>

    <div class="card">
        <img src="file:///C:/Users/HP/Desktop/Bilişim_projesi_mağazalar/selenium_product_images/selenium_image_2.jpg" alt="Product Image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="placeholder" style="display:none;">Image not available</div>
        <div class="info">
            <h3 class="title">Lenovo V14</h3>
            <p class="price">1899 TL</p>
        </div>
    </div>

    <div class="card">
        <img src="file:///C:/Users/HP/Desktop/Bilişim_projesi_mağazalar/selenium_product_images/selenium_image_3.jpg" alt="Product Image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="placeholder" style="display:none;">Image not available</div>
        <div class="info">
            <h3 class="title">iPhone 13</h3>
            <p class="price">11999 TL</p>
        </div>
    </div>
</body>
</html>
